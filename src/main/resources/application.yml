spring:
  application:
    name: ecom
  datasource:
    url: jdbc:postgresql://localhost:5432/ecom
    driver-class-name: org.postgresql.Driver
    username: ecom_user
    password: ecom_password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    # Let Hibernate auto-detect the dialect. Removed explicit database-platform
    # to avoid ClassNotFoundException for mismatched Hibernate versions.
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,shutdown,info,loggers,metrics
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true
    loggers:
      enabled: true

